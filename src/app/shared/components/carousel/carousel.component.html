<div class="carousel" *ngIf="slides.length > 0">
  <div class="carousel-inner">
    <div
      *ngFor="let slide of slides; let i = index"
      class="carousel-item"
      [class.active]="i === currentIndex"
      [style.background-image]="'url(' + slide.image + ')'">
      <div class="carousel-overlay"></div>
      <div class="carousel-content">
        <h2 class="carousel-title">{{ slide.title }}</h2>
        <p class="carousel-subtitle">{{ slide.subtitle }}</p>
      </div>
    </div>
  </div>

  <button class="carousel-control prev" (click)="previous()" aria-label="Previous">
    <span>‹</span>
  </button>

  <button class="carousel-control next" (click)="next()" aria-label="Next">
    <span>›</span>
  </button>

  <div class="carousel-indicators">
    <button
      *ngFor="let slide of slides; let i = index"
      [class.active]="i === currentIndex"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Slide ' + (i + 1)">
    </button>
  </div>
</div>
