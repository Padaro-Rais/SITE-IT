<div class="register-page">

  <div class="back-container">
  <button type="button" class="btn-back" (click)="goHome()">
    ← Retour à l'accueil
  </button>
</div>

  <div class="hero">
    <div class="container">
      <h1>Inscription</h1>
      <p class="subtitle">
        Remplissez le formulaire pour rejoindre ITLA Academy
      </p>
    </div>
  </div>

  <div class="container content">
    <div class="register-card">

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <h2>Informations personnelles</h2>

        <div class="form-row">
          <div class="form-group">
            <label>Nom</label>
            <input type="text" formControlName="nom">
          </div>

          <div class="form-group">
            <label>Prénom</label>
            <input type="text" formControlName="prenom">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Téléphone</label>
            <input type="text" formControlName="telephone">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" formControlName="password">
          </div>

          <div class="form-group">
            <label>Confirmation</label>
            <input type="password" formControlName="password_confirmation">
          </div>
        </div>

        <h2>Informations d'inscription</h2>

        <div class="form-group">
          <label>Groupe</label>
          <select formControlName="groupe_id">
            <option value="">Choisir un groupe</option>
            <option *ngFor="let groupe of groupes" [value]="groupe.id">
              {{ groupe.nom }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Vague</label>
          <select formControlName="vague_id">
            <option value="">Choisir une vague</option>
            <option *ngFor="let vague of vagues" [value]="vague.id">
              {{ vague.nom }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Centre</label>
          <select formControlName="centre">
            <option value="AGOE">AGOE</option>
            <option value="ADIDOGOME">ADIDOGOME</option>
            <option value="KPOGAN">KPOGAN</option>

          </select>
        </div>

        <div class="form-group">
          <label>Type de cours</label>
          <select formControlName="type_cours">
            <option value="jour">Jour</option>
            <option value="soir">Soir</option>
            <option value="weekend">Weekend</option>
            <option value="en_ligne">En ligne</option>
          </select>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="loading || registerForm.invalid">
          {{ loading ? 'Inscription en cours...' : 'S\'inscrire' }}
        </button>

      </form>
    </div>
  </div>
</div>

<div class="popup-overlay" *ngIf="showSuccessPopup">
  <div class="popup-card">
    <div class="popup-icon">✓</div>

    <h2>{{ popupTitle }}</h2>

    <p>{{ popupMessage }}</p>

    <button type="button" (click)="closePopup()">
      Fermer
    </button>
  </div>
</div>
